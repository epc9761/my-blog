<!DOCTYPE html>
<html>
<head>
  <title>My Blog</title>
</head>
<body>
  <h1>My Blog</h1>
  <div id="posts"></div>

  <script>
    fetch('/posts/index.json')
      .then(res => res.json())
      .then(posts => {
        const container = document.getElementById('posts');
        posts.forEach(post => {
          const div = document.createElement('div');
          div.innerHTML = `<h2>${post.title}</h2><p>${post.date}</p>`;
          container.appendChild(div);
        });
      });
  </script>
</body>
</html>
